  <div class="entry-eyebrow" style="margin-top:20px;">档案 · 0012 · 无光</div>
  <h2>一张画得很随意的示意图</h2>
  <div class="prose">
    <p>有读者私信给我一张手绘地图，说是「城区地下管网检修图的边角料」，画风很随意，大部分区域都是空白，只在西南角画了一小块阴影，旁边写了几个字，字迹几乎和纸的颜色融在了一起。</p>
    <p>我把这张图原样嵌入了这篇文章里，包括那几个「几乎看不见」的字——它们仍然在这个页面上，只是颜色和背景太接近了。试着全选这块区域看看。</p>
    <div class="map-area">
      <span class="almost-invisible">西南角标注：wuguang（字迹潦草，墨水已经洇开）</span>
    </div>
    <p>那片阴影区域，我后来对照了临江市的正式地图——那个位置，官方地图上什么都没有标注，是一片空白。</p>
  </div>
</main>
