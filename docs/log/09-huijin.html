  <div class="prose">
    <p>这一篇我写得很简短，因为我自己也没完全搞明白发生了什么。上周储物间小范围失火，消防清理现场时帮我从灰烬里抢出了一张扫描照片。</p>
    <figure>
      <img class="evidence" src="../assets/photo-13.png" alt="一张昏暗、颗粒感很重的走廊照片扫描件，画面模糊看不清具体位置。">

    </figure>
    <p>文件确实是PNG格式，但体积比同尺寸的普通照片大得不正常。我把原始文件原样放在了这篇文章下面，没有做任何处理。</p>
    <p>如果你也觉得这文件大小不对劲，也许它里面真的藏着别的东西——只是我自己没找到合适的工具去看。</p>
