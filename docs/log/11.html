  <h2>一篇写到一半的文章</h2>
  <div class="prose">
    <p>我现在有点不敢继续往下写了。上周有人在我家楼下的信箱里塞了一张纸条，只有一句话：「问得够多了。」没有署名。</p>
    <p>但我还是想把「守夜会」到底是什么记录下来——哪怕只能写一半。这次我把没写完的部分直接留在了网页里，没有删掉，只是让它在页面上先不显示出来。</p>
    <p>如果有一天这篇文章突然消失了，说明我大概率是猜对了什么不该猜的事情。</p>
